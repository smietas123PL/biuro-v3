services:
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
      target: dev
    environment:
      DB_DIR: /app/data          # baza w named volume
    env_file:
      - .env
    ports:
      - "3002:3001"
    volumes:
      - ./backend:/app:cached    # hot-reload
      - backend-nm:/app/node_modules
      - sqlite-data:/app/data    # trwała baza
    healthcheck:
      test: ["CMD","node","-e","require('http').get('http://localhost:3001/api/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      retries: 6
      start_period: 25s

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      target: dev
    ports:
      - "5173:5173"
      - "24678:24678"            # HMR WebSocket
    environment:
      VITE_API_URL: http://localhost:3002
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: "24678"
    env_file:
      - .env
    volumes:
      - ./frontend:/app:cached
      - frontend-nm:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  sqlite-data:
    name: biuro_sqlite-data
  backend-nm:
    name: biuro_backend-nm
  frontend-nm:
    name: biuro_frontend-nm
